<section class="table-shell">
  @if (columns().length === 0) {
    <div class="table-empty">Open a CSV file and execute a query to render rows.</div>
  } @else {
    <div class="table-header" [style.gridTemplateColumns]="gridTemplateColumns()">
      @for (column of columns(); track column) {
        <div class="table-head-cell" role="columnheader" [attr.aria-label]="column">
          <span class="table-head-title" [title]="column">{{ column }}</span>

          <div class="table-head-actions" aria-label="Column actions">
            <button
              type="button"
              class="icon-control sort-control"
              [class.active]="isSortActive(column, 'asc')"
              [attr.aria-pressed]="isSortActive(column, 'asc')"
              [title]="'Sort ascending by ' + column"
              (click)="requestSort(column, 'asc')"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 6 8.5 10h2.5v8h2v-8H15.5Z" />
              </svg>
            </button>

            <button
              type="button"
              class="icon-control sort-control"
              [class.active]="isSortActive(column, 'desc')"
              [attr.aria-pressed]="isSortActive(column, 'desc')"
              [title]="'Sort descending by ' + column"
              (click)="requestSort(column, 'desc')"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 18 15.5 14H13V6h-2v8H8.5Z" />
              </svg>
            </button>

            <button type="button" class="icon-control filter-control" [title]="'Insert filter for ' + column" (click)="requestFilter(column)">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 5h16l-6 7v5l-4 2v-7Z" />
              </svg>
            </button>
          </div>
        </div>
      }
    </div>

    <cdk-virtual-scroll-viewport class="table-viewport" [itemSize]="38" minBufferPx="300" maxBufferPx="800" (scrolledIndexChange)="onViewportIndexChanged($event)">
      <div class="table-row" [style.gridTemplateColumns]="gridTemplateColumns()" *cdkVirtualFor="let rowIndex of rowIndexes(); trackBy: trackByAbsoluteIndex" [class.loading-row]="loading()">
        @let row = rowForIndex(rowIndex);
        @for (column of columns(); track column) {
          <span class="table-cell" [title]="row?.[column] ?? ''">
            {{ row?.[column] ?? "" }}
          </span>
        }
      </div>
    </cdk-virtual-scroll-viewport>
  }
</section>
