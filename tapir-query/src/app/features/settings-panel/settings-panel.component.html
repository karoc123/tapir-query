@if (open()) {
  <div class="settings-backdrop" (click)="close()" aria-hidden="true"></div>

  <aside class="settings-panel" aria-label="Application settings">
    <header class="settings-header">
      <h3>Settings</h3>
      <button type="button" class="close-button" (click)="close()">Close</button>
    </header>

    <section>
      <p class="section-title">Theme</p>
      <div class="theme-grid">
        @for (option of options(); track option.id) {
          <button type="button" class="theme-card" [class.active]="option.id === activeTheme()" (click)="selectTheme(option.id)">
            <span class="theme-name">{{ option.label }}</span>
            <span class="theme-description">{{ option.description }}</span>
          </button>
        }
      </div>
    </section>

    <section class="app-meta-section">
      <p class="section-title">App</p>
      <div class="app-meta-card">
        <span class="app-meta-label">Version</span>
        <span class="app-meta-value">{{ version() ?? "unknown" }}</span>
      </div>
      <div class="app-meta-card app-meta-card-stacked">
        <span class="app-meta-label">Runtime Log</span>
        <span class="app-meta-value app-meta-path">{{ runtimeLogPath() ?? "unknown" }}</span>
      </div>
    </section>
  </aside>
}
