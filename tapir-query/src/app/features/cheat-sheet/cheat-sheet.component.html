@if (open()) {
  <div class="cheat-sheet-backdrop" (click)="close()" aria-hidden="true"></div>

  <aside class="cheat-sheet-drawer" aria-label="DuckDB cheat sheet">
    <header class="cheat-sheet-header">
      <h3>DuckDB Cheat Sheet</h3>
      <button type="button" class="close-button" (click)="close()">Close</button>
    </header>

    <p class="intro">
      Context-first SQL snippets for CSV workflows in Tapir Query.
    </p>

    <ul class="sheet-list">
      @for (item of items; track item.title) {
        <li class="sheet-item">
          <h4>{{ item.title }}</h4>
          <pre>{{ item.sql }}</pre>
          <p>{{ item.note }}</p>
        </li>
      }
    </ul>
  </aside>
}
