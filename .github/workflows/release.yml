name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_VERSION: ${{ inputs.version }}

jobs:
  prepare-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Validate release input
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version format: ${VERSION}. Expected semver like 1.2.3 or 1.2.3-rc.1" >&2
            exit 1
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "Tag v${VERSION} already exists. Choose a new version." >&2
            exit 1
          fi

      - name: Generate changelog entry
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"
          DATE="$(date -u +'%Y-%m-%d')"
          LAST_TAG="$(git describe --tags --abbrev=0 2>/dev/null || true)"

          if [[ -n "$LAST_TAG" ]]; then
            RANGE="${LAST_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          {
            echo "## v${VERSION} - ${DATE}"
            echo
            if [[ -n "$LAST_TAG" ]]; then
              echo "Changes since ${LAST_TAG}:"
            else
              echo "Initial release changes:"
            fi
            echo
            git log ${RANGE} --pretty=format:'- %s (%h)' || true
            echo
            echo
          } > release-notes.md

          if [[ -f CHANGELOG.md ]]; then
            cp CHANGELOG.md CHANGELOG.previous.md
            cat release-notes.md CHANGELOG.previous.md > CHANGELOG.md
            rm -f CHANGELOG.previous.md
          else
            cp release-notes.md CHANGELOG.md
          fi

      - name: Upload changelog artifacts
        uses: actions/upload-artifact@v4
        with:
          name: changelog
          if-no-files-found: error
          path: |
            CHANGELOG.md
            release-notes.md

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: prepare-changelog
    defaults:
      run:
        working-directory: tapir-query
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tapir-query/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tapir-query/src-tauri -> target

      - name: Sync versions from workflow input
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${RELEASE_VERSION}"

          node -e "const fs=require('fs'); const pkgPath='package.json'; const tauriPath='src-tauri/tauri.conf.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\\n'); const tc=JSON.parse(fs.readFileSync(tauriPath,'utf8')); tc.version=process.env.RELEASE_VERSION; fs.writeFileSync(tauriPath, JSON.stringify(tc,null,2)+'\\n');"

          node -e 'const fs=require("fs"); const cargoPath="src-tauri/Cargo.toml"; const src=fs.readFileSync(cargoPath,"utf8"); const next=src.replace(/(^version\s*=\s*")([^"]+)("\s*$)/m, (_match, prefix, _current, suffix) => prefix + process.env.RELEASE_VERSION + suffix); fs.writeFileSync(cargoPath,next);'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows bundles
        run: pnpm tauri build --ci -v --bundles nsis

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundles
          if-no-files-found: error
          path: |
            tapir-query/src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: prepare-changelog
    defaults:
      run:
        working-directory: tapir-query
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Install Linux build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: tapir-query/pnpm-lock.yaml

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            tapir-query/src-tauri -> target

      - name: Sync versions from workflow input
        shell: bash
        run: |
          set -euo pipefail

          node -e "const fs=require('fs'); const pkgPath='package.json'; const tauriPath='src-tauri/tauri.conf.json'; const pkg=JSON.parse(fs.readFileSync(pkgPath,'utf8')); pkg.version=process.env.RELEASE_VERSION; fs.writeFileSync(pkgPath, JSON.stringify(pkg,null,2)+'\\n'); const tc=JSON.parse(fs.readFileSync(tauriPath,'utf8')); tc.version=process.env.RELEASE_VERSION; fs.writeFileSync(tauriPath, JSON.stringify(tc,null,2)+'\\n');"

          node -e 'const fs=require("fs"); const cargoPath="src-tauri/Cargo.toml"; const src=fs.readFileSync(cargoPath,"utf8"); const next=src.replace(/(^version\s*=\s*")([^"]+)("\s*$)/m, (_match, prefix, _current, suffix) => prefix + process.env.RELEASE_VERSION + suffix); fs.writeFileSync(cargoPath,next);'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Linux bundles
        run: pnpm tauri build --ci -v --bundles deb

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bundles
          if-no-files-found: error
          path: |
            tapir-query/src-tauri/target/release/bundle/deb/*.deb

  create-release:
    runs-on: ubuntu-latest
    needs:
      - prepare-changelog
      - build-windows
      - build-linux
    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: Tapir Query v${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false
          body_path: release-assets/changelog/release-notes.md
          files: |
            release-assets/windows-bundles/**/*.exe
            release-assets/linux-bundles/**/*.deb
